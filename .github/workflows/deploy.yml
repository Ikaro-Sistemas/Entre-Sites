name: 🚀 Deploy Entre Sites

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── JOB 1: BUILD ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build & Docker Push
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Build do projeto (Vite)
        run: npm run build

      - name: 📤 Upload dos assets de build
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login no Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build & Push imagem Docker
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/entre-sites:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/entre-sites:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 2: FTP DEPLOY ─────────────────────────────────────────────────────
  ftp-deploy:
    name: 📡 Deploy para HostGator via FTP
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Baixar assets de build
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: 📡 Deploy via FTP (lftp)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_ROOT: ${{ secrets.FTP_REMOTE_ROOT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          lftp -c "
          set ftp:list-options -a;
          set net:max-retries 5;
          set net:reconnect-interval-base 5;
          set ssl:verify-certificate no;
          open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST';
          mirror -R --delete --verbose --no-symlinks dist/ $FTP_ROOT
          "

      - name: ✅ Deploy concluído
        run: |
          echo "✅ Deploy finalizado com sucesso!"
          echo "🌐 Site: https://entresites.com"
          echo "📅 Data: $(date '+%d/%m/%Y %H:%M:%S')"
          echo "🔖 Commit: ${{ github.sha }}"
