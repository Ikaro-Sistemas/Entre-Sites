name: 🚀 Deploy Entre Sites

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── JOB 1: BUILD ──────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Vite
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🏗️ Build produção
        run: npm run build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  # ─── JOB 2: DOCKER ─────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Build & Push imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/entre-sites:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/entre-sites:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── JOB 3: FTP DEPLOY ─────────────────────────────────────────────────────
  ftp-deploy:
    name: 📡 Deploy HostGator FTP
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: 📋 Listar arquivos para deploy
        run: ls -la dist/

      - name: 📡 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_REMOTE_ROOT }}
          dangerous-clean-slate: false
          log-level: verbose
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: ✅ Deploy concluído
        run: |
          echo "✅ Deploy finalizado com sucesso!"
          echo "🌐 Site: https://entresites.com"
          echo "📅 Data: $(date '+%d/%m/%Y %H:%M:%S')"
          echo "🔖 Commit: ${{ github.sha }}"
