services:
  # ─── Desenvolvimento local (hot-reloading) ───────────────────────────────────
  app:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host

  # ─── Produção local (Nginx, imagem final) ───────────────────────────────────
  app-prod:
    build:
      context: .
      target: production
    ports:
      - "8080:80"
    profiles:
      - prod

volumes:
  node_modules:
